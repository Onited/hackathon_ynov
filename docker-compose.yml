services:
  frontend:
    build:
      context: ./rendu/devweb
    container_name: techcorp-frontend
    ports:
      - "5173:5173"
    depends_on:
      init-ollama:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: techcorp-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_server:/ollama_server
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-ollama:
    image: ollama/ollama:latest
    container_name: techcorp-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama_server:/ollama_server
    environment:
      - OLLAMA_HOST=ollama:11434
    restart: on-failure
    command: >
      sh -c "
      echo 'Waiting for Ollama to be ready...' &&
      until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
      echo 'Ollama is ready. Pulling Phi-3.5 base model...' &&
      ollama pull phi3.5 &&
      echo 'Creating phi3-financial model from Modelfile...' &&
      ollama create phi3-financial -f /ollama_server/Modelfile &&
      echo 'Le modèle phi3-financial est prêt pour TechCorp !'
      "

volumes:
  ollama_data:
